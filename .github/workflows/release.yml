name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip push to registries)"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: "Version from release-please"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Prepare: Extract version and create tag if manual trigger
  # ─────────────────────────────────────────────────────────────

  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dry_run: ${{ steps.version.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          # inputs.version is set when called via workflow_call or workflow_dispatch
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            DRY_RUN="${{ inputs.dry_run || 'false' }}"
          else
            # Tag push trigger (refs/tags/v1.2.3)
            VERSION="${GITHUB_REF#refs/tags/v}"
            DRY_RUN="false"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION (dry_run: $DRY_RUN)"

  # ─────────────────────────────────────────────────────────────
  # Build Jobs (parallel)
  # ─────────────────────────────────────────────────────────────

  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pwa/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: pwa
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: pwa
        run: pnpm build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pwa-dist
          path: pwa/dist
          retention-days: 1

  build-api-amd64:
    name: Build API (amd64)
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: tmux-api/go.mod

      - name: Build
        working-directory: tmux-api
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o tmux-api-linux-amd64 .

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: tmux-api-linux-amd64
          path: tmux-api/tmux-api-linux-amd64
          retention-days: 1

  build-api-arm64:
    name: Build API (arm64)
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: tmux-api/go.mod

      - name: Build
        working-directory: tmux-api
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o tmux-api-linux-arm64 .

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: tmux-api-linux-arm64
          path: tmux-api/tmux-api-linux-arm64
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Docker Build & Push (depends on all builds)
  # ─────────────────────────────────────────────────────────────

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [prepare, build-pwa, build-api-amd64, build-api-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare build context
        run: |
          # PWA dist
          mkdir -p pwa/dist
          cp -r artifacts/pwa-dist/* pwa/dist/

          # tmux-api binaries (both architectures for multi-arch build)
          cp artifacts/tmux-api-linux-amd64/tmux-api-linux-amd64 tmux-api/tmux-api-linux-amd64
          cp artifacts/tmux-api-linux-arm64/tmux-api-linux-arm64 tmux-api/tmux-api-linux-arm64
          chmod +x tmux-api/tmux-api-*

          # Create dummy .htpasswd
          echo 'termote:$apr1$placeholder$hash' > .htpasswd

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (all-in-one)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.version, '-') }}
            type=raw,value=${{ needs.prepare.outputs.version }}

      - name: Docker meta (hybrid)
        id: meta-hybrid
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-hybrid
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME }}-hybrid
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.version, '-') }}
            type=raw,value=${{ needs.prepare.outputs.version }}

      - name: Build & push (all-in-one)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare.outputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push (hybrid)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.hybrid
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare.outputs.dry_run != 'true' }}
          tags: ${{ steps.meta-hybrid.outputs.tags }}
          labels: ${{ steps.meta-hybrid.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # GitHub Release (depends on docker)
  # ─────────────────────────────────────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, docker]
    if: needs.prepare.outputs.dry_run != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          # Create release directory
          mkdir -p release

          # PWA dist zip
          cd artifacts/pwa-dist
          zip -r ../../release/pwa-dist-v${VERSION}.zip .
          cd ../..

          # Copy binaries
          cp artifacts/tmux-api-linux-amd64/tmux-api-linux-amd64 release/
          cp artifacts/tmux-api-linux-arm64/tmux-api-linux-arm64 release/
          chmod +x release/tmux-api-*

          # Create tarball (all files needed for install.sh)
          mkdir -p termote-v${VERSION}
          cp -r scripts nginx systemd Makefile README.md termote-v${VERSION}/
          cp docker-compose.yml Dockerfile Dockerfile.hybrid termote-v${VERSION}/
          cp entrypoint-allinone.sh entrypoint-hybrid.sh termote-v${VERSION}/
          cp -r artifacts/pwa-dist termote-v${VERSION}/pwa-dist
          # Include pre-built binaries
          cp artifacts/tmux-api-linux-amd64/tmux-api-linux-amd64 termote-v${VERSION}/
          cp artifacts/tmux-api-linux-arm64/tmux-api-linux-arm64 termote-v${VERSION}/
          tar czf release/termote-v${VERSION}.tar.gz termote-v${VERSION}

          # Copy install script standalone
          cp scripts/install.sh release/

          # Generate checksums
          cd release
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            release/termote-v${{ needs.prepare.outputs.version }}.tar.gz
            release/pwa-dist-v${{ needs.prepare.outputs.version }}.zip
            release/tmux-api-linux-amd64
            release/tmux-api-linux-arm64
            release/install.sh
            release/checksums.txt

  # ─────────────────────────────────────────────────────────────
  # Sync Version to package.json (skip if release-please handles it)
  # ─────────────────────────────────────────────────────────────

  sync-version:
    name: Sync package.json version
    runs-on: ubuntu-latest
    needs: [prepare, release]
    # Skip when called by release-please (it handles version sync via extra-files)
    # Use inputs.version to detect workflow_call since event_name check is unreliable
    if: inputs.version == ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package.json
        working-directory: pwa
        run: |
          npm version ${{ needs.prepare.outputs.version }} --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pwa/package.json
          git commit -m "chore: bump version to ${{ needs.prepare.outputs.version }}"
          git push origin main

  # ─────────────────────────────────────────────────────────────
  # Sync README to Docker Hub
  # ─────────────────────────────────────────────────────────────

  dockerhub-readme:
    name: Update Docker Hub README
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v6

      - name: Update Docker Hub description (all-in-one)
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: lamngockhuong/termote
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md

      - name: Update Docker Hub description (hybrid)
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: lamngockhuong/termote-hybrid
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
