name: Release Please

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only show what would be released)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: termote
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  # Trigger release workflow when release is created
  call-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' && github.event.inputs.dry_run != 'true'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
    secrets: inherit
