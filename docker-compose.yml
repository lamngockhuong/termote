# Termote Docker Compose
# --docker: all-in-one container
# --hybrid: nginx+tmux-api container + native ttyd

services:
  # Docker mode: all-in-one (nginx + ttyd + tmux-api)
  termote:
    build: .
    container_name: termote
    profiles: [docker]
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "8080:8080"
    volumes:
      - ${WORKSPACE:-./workspace}:/workspace:rw
    working_dir: /workspace
    restart: unless-stopped

  # Hybrid mode: nginx + tmux-api (ttyd runs native)
  termote-hybrid:
    build:
      context: .
      dockerfile: Dockerfile.hybrid
    container_name: termote-hybrid
    profiles: [hybrid]
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${TMUX_SOCKET_DIR:-/tmp/tmux-1000}:/tmp/tmux-socket:rw
    environment:
      - TMUX_SOCKET=/tmp/tmux-socket/default
    restart: unless-stopped
