# Tailscale nginx config (HTTPS via Tailscale certs)
# Certs auto-generated: sudo tailscale cert <hostname>
# Binds to Tailscale IP only (not LAN accessible)

server {
    listen <tailscale_ip>:<port> ssl http2;
    server_name _;

    # Tailscale certificates (run: sudo tailscale cert <hostname>)
    ssl_certificate /var/lib/tailscale/certs/<hostname>.crt;
    ssl_certificate_key /var/lib/tailscale/certs/<hostname>.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Basic auth (optional with Tailscale - network already private)
    # auth_basic "Termote";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # PWA static files
    root /var/www/termote;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Terminal WebSocket
    location /terminal/ {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # tmux API
    location /api/tmux/ {
        proxy_pass http://127.0.0.1:7682/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
